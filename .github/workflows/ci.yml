name: CI

on: [push]

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Lint code
        run: swiftformat --lint .

  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Build library
        run: swift build

